<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a12;
      overflow: hidden;
    }
    #unity-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    /* 세로는 실제 보이는 뷰포트 높이(--vh, JS로 window.innerHeight 기반 계산)를 채운다.
       모바일 사파리/크롬의 100vh(주소창 포함) 문제로 아래가 잘리는 것을 막는다.
       가로는 9:16 기준 폭을 유지하되 화면보다 넓지 않게 한다. */
    #unity-canvas {
      width: min(100vw, calc(var(--vh, 1vh) * 56.25));
      height: calc(var(--vh, 1vh) * 100);
      background: #0a0a12;
      display: block;
    }
    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #cfd2da;
      font-family: sans-serif;
    }
    #unity-progress-bar-empty {
      width: 240px;
      height: 14px;
      margin-top: 12px;
      background: #22242c;
      border-radius: 7px;
      overflow: hidden;
    }
    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #3aa0a8;
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div>로딩 중...</div>
      <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
    </div>
  </div>
  <script>
    // 모바일 브라우저에서 실제 보이는 뷰포트 높이를 --vh 로 반영(주소창 표시/숨김 대응).
    function setViewportHeight() {
      document.documentElement.style.setProperty("--vh", (window.innerHeight * 0.01) + "px");
    }
    setViewportHeight();
    window.addEventListener("resize", setViewportHeight);
    window.addEventListener("orientationchange", setViewportHeight);

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
    var config = {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      // 내부 렌더 해상도를 dpr 기준으로 올리되 최소 2배 슈퍼샘플링(비율 유지, 선명).
      devicePixelRatio: Math.min(3, Math.max(2, window.devicePixelRatio || 1)),
    };

    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        progressBarFull.style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        loadingBar.style.display = "none";
      }).catch((message) => {
        alert(message);
      });
    };
    document.body.appendChild(script);
  </script>
</body>
</html>
